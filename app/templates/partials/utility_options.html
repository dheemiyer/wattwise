<label for="utility" class="block text-sm font-medium mb-1">Utility provider</label>
<select id="utility" name="utility"
        class="w-full rounded-lg border border-slate-300 px-3 py-2.5 bg-white
               focus:ring-2 focus:ring-emerald-600 focus:border-emerald-600 focus:outline-none">
  {% if candidates %}
    {% for c in candidates %}
    <option value="{{ c.key }}">{{ c.name }}</option>
    {% endfor %}
  {% else %}
    <option value="">Auto-detect from zip</option>
  {% endif %}
</select>
